# This is used in development only (Alchemy is used for production deployments).
#
# The host is the catch-all Worker that serves the landing grid. It has no D1 or
# Durable Object — those live in each independent child mini app.

name = "zconsole-dev"
main = "server/src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (client build)
# In dev: Vite serves the client at :5173 (this is unused).
# In production: Alchemy uploads ./client/dist to Workers Assets.

# Dev server configuration
[dev]
port = 8787
